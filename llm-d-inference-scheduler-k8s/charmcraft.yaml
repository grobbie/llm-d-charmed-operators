type: charm
name: llm-d-inference-scheduler-k8s
title: LLMD Inference Router
summary: Inference Gateway for LLMD.
description: Routes traffic and coordinates inference workloads between prefill and decode nodes.

base: ubuntu@24.04
platforms:
  amd64:
  arm64:

assumes:
  - juju >= 3.6
  - k8s-api

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
      
charm-user: non-root

config:
  options:
    port:
      description: The port on which the router will serve the API.
      type: int
      default: 8000
    kv-cache-usage-metric:
      description: The vLLM prometheus format metric target for prefix utilization calculations
      type: string
      default: "vllm:kv_cache_usage_perc"
    log-verbosity:
      description: The internal numerical trace verbosity of the Go application routing core
      type: int
      default: 0
    prometheus-url:
      type: string
      default: "http://prometheus-k8s-0.prometheus-k8s-endpoints.cos.svc.cluster.local:9090"
      description: "URL for the Prometheus server to fetch metrics from."
    metrics-interval:
      type: string
      default: "10s"
      description: "Interval for realtime metric scraping."
    scoring-plugins:
      type: string
      default: "queue-scorer,kv-cache-utilization-scorer"
      description: "Comma separated list of active inference scoring plugins."
    router-port:
      description: The port Envoy listener accepts traffic on.
      type: int
      default: 8080
    admin-port:
      description: The Envoy admin interface port.
      type: int
      default: 9901
provides:
  metrics-endpoint:
    interface: prometheus_scrape
  grafana-dashboard:
    interface: grafana_dashboard

requires:
  prefill-worker:
    interface: llm-d-prefill
  decode-worker:
    interface: llm-d-decode
  kv-cache-manager:
    interface: kv-cache-manager
    optional: true
  logging:
    interface: loki_push_api
  tracing:
    interface: tracing
    limit: 1

containers:
  llm-d-inference-scheduler:
    resource: llmd-image
    uid: 65532
    gid: 65532
  routing-sidecar:
    resource: routing-image
    uid: 65532
    gid: 65532

resources:
  llmd-image:
    type: oci-image
    description: OCI image for the LLMD Inference Scheduler (ExtProc)
    upstream-source: "ghcr.io/llm-d/llm-d-inference-scheduler:v0.6.0"
  routing-image:
    type: oci-image
    description: OCI image for the Envoy routing data plane
    upstream-source: "ghcr.io/llm-d/llm-d-routing-sidecar:v0.6.0"

